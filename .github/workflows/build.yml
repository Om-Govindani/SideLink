name: Build SideLink

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build-macos:
    name: Build macOS Host
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile macOS Application
        run: |
          rm -f host/macos/SideLinkHostApp
          chmod +x host/macos/build.sh
          ./host/macos/build.sh

      - name: Upload macOS Executable
        uses: actions/upload-artifact@v4
        with:
          name: SideLinkHostApp
          path: host/macos/SideLinkHostApp

  build-android:
    name: Build Android Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Compile APK via Gradle
        run: |
          cd client/android
          gradle assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: SideLink-Android-APK
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
